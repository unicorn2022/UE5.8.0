;
; Base Driver Deny List
; =====================
;
; Hardware checks are controlled by the console variable "r.WarnOfBadDrivers". The the console variable options for more information.
;
; What to do when a certain driver or hardware shows problems:
;  - If the driver exhibiting the problem is old, add it to the DriverDenyList with "<=". In general it's better to ask users to upgrade.
;  - If the driver exhibiting the problem is the latest, add it to the DriverDenyList with ">=". We should not assume the next driver version fixes the problem.
;
; Expectations on QA:
;  - QA always tests the latest driver version.
;  - When a new driver is released, QA should test it and if it does not introduce bugs the SuggestedDriverVersion should be updated to the latest driver.
;  - If the latest driver is denied, it is not removed until QA verifies it is fixed.
;  - If driver specific bugs are found, enter them in JIRA so that they can be tracked.
;
; Expectations on Engineering:
;  - Bugs on older drivers are added to the DriverDenyList and otherwise ignored.
;  - Bugs on the latest driver are added to the DriverDenyList but treated as critical bugs for which we must try to find a workaround. We must also notify the IHV to help if we cannot find the problem.
;
; INI sections:
;    [Vendor OS] where
;    Vendor: GPU_NVIDIA, GPU_AMD, GPU_Intel
;    OS: Windows, Linux
;
; Explanation of the INI entries:
;  - "SuggestedDriverVersion": string used to communicate to the user which driver version is appropriate (not used by any code), empty if unknown.
;		Can use multiple so we can add per RHI appending ";D3D12" for instance for a specific RHI; having no ';RHI' will return that one if the RHI is not found
;  - "DriverDenyList": array of tests that can be made to mark a driver or a range of them as problematic
;    "DriverVersion": to compare against the "unified driver" (see log) version e.g. "123.45.2" "==123.45" "<123.45", comparison operators: == != > < >= <=
;    "Reason": string used to document the reason for denying the driver, could be shown to the user
;    comment above each deny list entry: more details about the problem, potential workarounds
;    "AdapterGeneration": to compare against the vendor-specific hardware adapter version. Same comparison operators allowed as "DriverVersion".
;  - "SuggestedDriverList": array of tests that can be made to specialize suggested drivers for specific adapters. Useful for pinning adapters that are out of
;    support to their latest support driver version, or to pin problematic adapters to known good driver versions. The "DriverVersion" parameter is the user-facing
;    driver version, similar to "SuggestedDriverVersion".
;
;-----------------------------------------------------------------------------------------------------------------

[GPU_NVIDIA Windows]

; Turing and newer - Suggest 591.86 (January 2026) or later. Require 552.44 (May 2024) for D3D12, 570 series for Vulkan
SuggestedDriverVersion="591.86"
+DriverDenyList=(DriverVersion="<552.44", AdapterGeneration=">=352" Reason="These driver versions have known stability issues and missing features", RHI="D3D12")
+DriverDenyList=(DriverVersion="<570.00", Reason="These driver versions have known stability issues and missing features", RHI="Vulkan")

; Kepler (Out of support) - Latest available driver version is 475.14 (July 2024).
+SuggestedDriverList=(DriverVersion="475.14", AdapterGeneration="<=256")
+DriverDenyList=(DriverVersion="<475.14", AdapterGeneration="<=256", Reason="These driver versions have known security issues")

; Maxwell/Pascal/Volta (Out of support) - Latest available driver version is 582.28 (January 2026). This was a security update, so deny older drivers for these adapters.
+SuggestedDriverList=(DriverVersion="582.28", AdapterGeneration="272")
+SuggestedDriverList=(DriverVersion="582.28", AdapterGeneration="288")
+SuggestedDriverList=(DriverVersion="582.28", AdapterGeneration="304")
+SuggestedDriverList=(DriverVersion="582.28", AdapterGeneration="320")
+SuggestedDriverList=(DriverVersion="582.28", AdapterGeneration="336")
+DriverDenyList=(DriverVersion="<582.28", AdapterGeneration="272", Reason="These driver versions have known security issues")
+DriverDenyList=(DriverVersion="<582.28", AdapterGeneration="288", Reason="These driver versions have known security issues")
+DriverDenyList=(DriverVersion="<582.28", AdapterGeneration="304", Reason="These driver versions have known security issues")
+DriverDenyList=(DriverVersion="<582.28", AdapterGeneration="320", Reason="These driver versions have known security issues")
+DriverDenyList=(DriverVersion="<582.28", AdapterGeneration="336", Reason="These driver versions have known security issues")


