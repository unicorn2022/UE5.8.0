[GPU_Intel Windows]

; 6th Gen
+SuggestedDriverList=(DriverVersion="31.0.101.2115", AdapterGeneration="6")
+DriverDenyList=(DriverVersion="<101.2115", RHI="D3D12", AdapterGeneration="6", Reason="These driver versions have known stability and performance issues")

; 7th-10th Gen
+SuggestedDriverList=(DriverVersion="31.0.101.2140", AdapterGeneration="7")
+DriverDenyList=(DriverVersion="<101.2140", RHI="D3D12", AdapterGeneration="7", Reason="These driver versions have known stability and performance issues")

; Gen 11-14, Arc Pro, Arc - Suggest 32.0.101.8509 (February 2026). Deny anything older than 101.5989 (September 2024) for D3D12 and Vulkan
SuggestedDriverVersion="32.0.101.8509"
+DriverDenyList=(DriverVersion="<101.5989", RHI="D3D12", AdapterGeneration=">=11", Reason="These driver versions have known stability and performance issues")
+DriverDenyList=(DriverVersion="<101.5989", RHI="Vulkan", Reason="These driver versions have known stability and performance issues")

; Legacy integrated GPUs are supported by several driver packages (depending on CPU generation) and they all have different version numbers, so
; we will check the date instead. The latest driver for Ivy Bridge chips is 105.161, dated Aug 6th 2020, so we will allow that for D3D11.
+DriverDenyList=(DriverDate="<8-6-2020", Reason="These driver versions have known stability issues and missing features", RHI="D3D11")

;-----------------------------------------------------------------------------------------------------------------

[GPU_Intel Linux]
SuggestedDriverVersion="26.0.0"

; Mesa builds older than 25.0.0 have issues running UE5, so we'll use this as the minimum version.
+DriverDenyList=(DriverVersion="<25.0.0", Reason="These driver versions have known stability issues and missing features")
