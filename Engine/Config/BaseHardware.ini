[GPU_AMD Windows]

; RDNA1 and newer - Suggest 26.2.2 (February 2026) - RDNA1 and RDNA2 are supported by this driver in "maintenance mode".
; Deny drivers before 26.1.1 (January 2026) as previous versions would crash the editor with RT enabled
SuggestedDriverVersion="26.2.2"
+DriverDenyList=(DriverDate="<1-21-2026", AdapterGeneration=">=7", Reason="These driver versions have known stability issues and missing features")

; GCN1 to GCN3 (Out of support) - Latest driver is 22.6.1 (AKA 27.20.20912.1002) (2022).
+SuggestedDriverList=(DriverVersion="22.6.1", AdapterGeneration="<=6")
+DriverDenyList=(DriverVersion="<27.20.20912.1002", AdapterGeneration="<=6", Reason="These driver versions have known stability issues and missing features")

;-----------------------------------------------------------------------------------------------------------------

[GPU_AMD Linux]
SuggestedDriverVersion="26.0.0"

; For SM6 and ray tracing, version 25.0.0+ of RADV is required. Suggesting 26.0+ to conform with the version in Ubuntu 26.04 LTS
; Note that it's also possible to use the AMD proprietary driver (discontinued as of Sept 2025) on Linux, and we don't distinguish between driver vendors.
+DriverDenyList=(DriverVersion="<25.0.0", Reason="These driver versions have known stability issues and missing features")

